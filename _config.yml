title: Lindsey Sobrinski
tagline: Growth that survives the measurement.
description: >-
  Growth and performance marketing: cross-channel paid media, SEO/AEO/GEO,
  lifecycle and retention, and user-journey conversion work — allocated by
  incrementality and contribution, not platform-reported ROAS.
url: "https://lindseysobrinski.com"
baseurl: ""

author:
  name: Lindsey Vandermaas Sobrinski
  email: lsobrinski@gmail.com
  linkedin: https://www.linkedin.com/in/lindsey-vandermaas
  jobTitle: Growth & Performance Marketing Leader
  # Entity-authority fields for the Person schema. Sourced from the About page.
  description: >-
    Growth and performance marketing leader with 15+ years across enterprise
    retail, B2B services, agencies, and subscription DTC.
  award: "Marketer of the Year, 2022"
  memberOf: Center for Retail and Sales
  # sameAs strengthens entity resolution — add more corroborating profiles
  # (speaker pages, published articles, Crunchbase, Muck Rack) as URLs here.
  sameAs:
    - https://www.linkedin.com/in/lindsey-vandermaas

markdown: kramdown
kramdown:
  input: GFM
  toc_levels: 2..3
  syntax_highlighter: rouge

permalink: /blog/:title/
timezone: America/Chicago

# Social share image, cut to exactly 1200x630 — the Open Graph target size.
og_image: /assets/img/lindsey-hero.jpg
# Used for Person.image in schema, where an actual portrait is the right subject.
portrait_image: /assets/img/lindsey-portrait.jpg

# Scheduled posts: any post dated in the future is held back at build time.
# A daily GitHub Action re-triggers the Pages build so each post goes live on
# its own date. See .github/workflows/daily-rebuild.yml.
future: false

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# jekyll-feed defaults to /feed.xml; the footer and <head> both point at
# /blog/feed.xml, so move it rather than leave a broken link.
feed:
  path: blog/feed.xml

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "page"

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - .jekyll-cache
  - cloudflare-worker      # deploys to Cloudflare, not part of the published site
  - copy-edit-notes.md

# Note: geo.html, roas.html, and scorecard.html have no front matter, so Jekyll
# copies them through untouched and they keep their own self-contained styles.
# That also means they do NOT get the shared nav — see README.
