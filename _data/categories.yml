# Blog subcategories. Each needs a matching stub in blog/categories/<slug>.html
# Order here drives the order of the category nav on the blog index.
#
# `blurb` is the visible lede AND the page's meta description, so keep it
# under ~160 characters or it will truncate in search results.

- slug: seo
  name: SEO
  color: accent
  blurb: >-
    Organic visibility that compounds: technical foundations, entity and topic
    architecture, and content that earns the position instead of renting it.

- slug: aeo
  name: AEO
  color: accent
  blurb: >-
    Answer Engine Optimization: structuring content so it gets lifted into the
    answer box, where the click may never happen.

- slug: geo
  name: GEO
  color: purple
  blurb: >-
    Generative Engine Optimization: getting cited by ChatGPT, Gemini, and
    Perplexity, with a different play per engine and journey stage.

- slug: paid-media
  name: Paid Media
  color: good
  blurb: >-
    Planning and buying across paid social, search, programmatic, video, CTV,
    and OOH — judged on incremental impact, not reported ROAS.

- slug: lifecycle
  name: Lifecycle
  color: good
  blurb: >-
    Retention, loyalty, churn, and win-back: the half of growth that decides
    whether acquisition was worth paying for.

- slug: subscriptions
  name: Subscriptions
  color: good
  blurb: >-
    Subscription economics: cohort behavior, order frequency, involuntary
    churn, and the unit math that makes or breaks the model.

- slug: user-journey
  name: User Journey
  color: purple
  blurb: >-
    Mapping the real path to conversion and finding the steps where buyer
    intent quietly dies.

- slug: conversion-optimization
  name: Conversion Optimization
  color: accent
  blurb: >-
    Testing, evidence, and the discipline to tell a real lift from noise.

- slug: technical-seo
  name: Technical SEO
  color: accent
  blurb: >-
    Rendering, crawl budget, canonical integrity, redirects, and Core Web
    Vitals — the infrastructure that decides whether a large site ranks at all.

- slug: ecommerce-seo
  name: Ecommerce SEO
  color: good
  blurb: >-
    Category-page content, variant indexing, Shopping feeds, and seasonal
    timing — turning commercial-page rankings into captured revenue.

- slug: content-seo
  name: Content SEO
  color: purple
  blurb: >-
    Entity and topic architecture, answer-first structure, and content that
    earns the position and the citation instead of renting them.

- slug: local-seo
  name: Local SEO
  color: good
  blurb: >-
    Multi-location and appointment-driven visibility: exposing trust signals,
    service schema, and a KPI that's booked appointments, not near-me rankings.

- slug: ai
  name: AI
  color: purple
  blurb: >-
    Notes on AI and the systems it's reshaping — what the models are really
    doing, and what it means for how we build, measure, and compete.
