  <text x="72" y="568" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#51607a">Growth that survives the measurement.</text>
  <rect x="640" y="200" rx="18" width="330" height="200" fill="#ffffff" stroke="#1e8e5a" stroke-width="3.5" filter="url(#sh)"/><rect x="640" y="232" width="330" height="34" fill="#1e8e5a" opacity="0.18"/><rect x="672" y="300" rx="6" width="46" height="34" fill="#1e8e5a" opacity="0.35"/><rect x="672" y="352" rx="4" width="240" height="12" fill="#eef4f8"/><circle cx="966" cy="206" r="34" fill="#c0392b"/><line x1="953" y1="193" x2="979" y2="219" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/><line x1="979" y1="193" x2="953" y2="219" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/><path d="M700 470 a58 58 0 1 1 82 8" fill="none" stroke="#1e8e5a" stroke-width="4" stroke-linecap="round"/><path d="M782 486 l4 -22 l-20 8 z" fill="#1e8e5a"/><text x="792" y="530" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#51607a">retry, don’t churn</text>
