  <text x="145.5" y="96" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="1.5" fill="#1e8e5a">LIFECYCLE</text>
