<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fafc"/><stop offset="1" stop-color="#e8f0f6"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#1a2333" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="10" height="630" fill="#1e8e5a"/>
  <!-- category pill -->
  <rect x="72" y="70" rx="20" ry="20" width="160" height="40" fill="#eef4f8"/>
  <text x="152.0" y="96" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="1.5" fill="#1e8e5a">PAID MEDIA</text>
  <text x="72" y="176" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="46" font-weight="800" fill="#1a2333" letter-spacing="-0.5">Diminishing</text><text x="72" y="234" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="46" font-weight="800" fill="#1a2333" letter-spacing="-0.5">returns</text>
  <!-- wordmark -->
  <text x="72" y="540" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="26" font-weight="800" fill="#1a2333" letter-spacing="-0.3">Lindsey Sobrinski</text>
  <text x="72" y="568" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#51607a">Growth that survives the measurement.</text>
  <line x1="600" y1="470" x2="1090" y2="470" stroke="#dde7ee" stroke-width="3"/><line x1="600" y1="150" x2="600" y2="470" stroke="#dde7ee" stroke-width="3"/><path d="M600 460 C 720 460, 780 240, 900 210 C 980 190, 1030 185, 1080 183" fill="none" stroke="#1e8e5a" stroke-width="5" stroke-linecap="round"/><line x1="905" y1="238" x2="1090" y2="196" stroke="#1e8e5a" stroke-width="2.5" stroke-dasharray="7 7" opacity="0.7"/><circle cx="905" cy="209" r="10" fill="#1e8e5a"/><circle cx="905" cy="209" r="18" fill="none" stroke="#1e8e5a" stroke-width="2" opacity="0.4"/><text x="845" y="500" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#51607a">spend</text><text x="576" y="160" text-anchor="end" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#51607a" transform="rotate(-90 576 160)"></text><text x="640" y="185" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#51607a">return</text>
